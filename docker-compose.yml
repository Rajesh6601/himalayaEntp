services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: himalaya-entp-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - himalaya_pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - himalaya-entp-net

  # ── Node.js REST API ──
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: himalaya-entp-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - himalaya-entp-net

  # ── Nginx Frontend ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: himalaya-entp-frontend
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - himalaya-entp-net

  # ── pgAdmin (Optional) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: himalaya-entp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5051}:80"
    depends_on:
      - postgres
    networks:
      - himalaya-entp-net

volumes:
  himalaya_pgdata:
    driver: local

networks:
  himalaya-entp-net:
    driver: bridge
